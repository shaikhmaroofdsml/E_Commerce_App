# admin-service configuration
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_admin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ecommerce
    password: ecommerce123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# Internal service URLs (admin-service calls other services directly)
services:
  product-service: http://localhost:8082
  order-service: http://localhost:8083
  customer-service: http://localhost:8081
  payment-service: http://localhost:8086

management:
  endpoints:
    web:
      exposure:
        include: health,info
