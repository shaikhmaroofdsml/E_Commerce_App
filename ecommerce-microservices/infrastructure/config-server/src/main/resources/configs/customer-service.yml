# customer-service configuration
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_customers?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ecommerce
    password: ecommerce123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  security:
    user:
      name: customer-admin
      password: customer-secret

jwt:
  private-key-path: classpath:keys/private.pem
  expiration-ms: 86400000   # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health,info
