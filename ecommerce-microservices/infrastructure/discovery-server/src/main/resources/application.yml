server:
  port: 8761

spring:
  application:
    name: discovery-server
  config:
    import: "optional:configserver:http://config-admin:config-secret@localhost:8888"
  security:
    user:
      name: eureka
      password: eureka-secret

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false   # Don't register itself
    fetch-registry: false
    service-url:
      defaultZone: http://eureka:eureka-secret@localhost:8761/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0
    enable-self-preservation: false   # Disable in development

management:
  endpoints:
    web:
      exposure:
        include: health,info
