server:
  port: 8084

spring:
  application:
    name: notification-service
  config:
    import: "optional:configserver:http://config-admin:config-secret@localhost:8888"

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://eureka:eureka-secret@localhost:8761/eureka/

logging:
  level:
    com.ecommerce.notification: DEBUG
